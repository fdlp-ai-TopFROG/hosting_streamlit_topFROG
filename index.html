<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Frog</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #262730;
            color: #FAFAFA;
            border: 1px solid #4B4C53;
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 1000;
            font-size: 14px;
            transition: 0.3s ease;
        }
        .theme-toggle:hover {
            transform: scale(1.05);
        }
        .theme-toggle.light-mode-btn {
            background: #FFFFFF;
            color: #31333F;
            border: 1px solid #CCCCCC;
        }
    </style>
</head>
<body>
    <button id="toggleBtn" class="theme-toggle">🌙 Switch to Dark Mode</button>

    <iframe id="appFrame" src="https://topfrog.streamlit.app/?embed=true&amp;theme=light" allow="camera; microphone; geolocation"></iframe>

    <script>
        const btn = document.getElementById('toggleBtn');
        const frame = document.getElementById('appFrame');
        const baseUrl = "https://topfrog.streamlit.app/?embed=true";
        let isDark = false;

        btn.addEventListener('click', () => {
            isDark = !isDark;
            if (isDark) {
                btn.textContent = "☀️ Switch to Light Mode";
                btn.classList.add('light-mode-btn');
                frame.src = baseUrl + "&theme=dark";
            } else {
                btn.textContent = "🌙 Switch to Dark Mode";
                btn.classList.remove('light-mode-btn');
                frame.src = baseUrl + "&theme=light";
            }
        });
    </script>
</body>
</html>
